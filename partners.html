<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Partner Collaboration Map - Power of Public</title>
<style>
/* RESET */
*{box-sizing:border-box;margin:0;padding:0;}

/* BRAND PALETTE */
:root{
  --navy:   #1A1A2E;
  --pink:   #E8187A;
  --amber:  #D4A017;
  --emerald:#1A8C5B;
  --cream:  #F5F0E8;
  --tan:    #EDE8DC;
  --charcoal:#2D2D2D;
  --bg:     #F2EDE4;
  --surface:#FFFFFF;
  --border: #D5CCBC;
  --muted:  #8A847C;
  --text:   #2D2D2D;
}

body{background:var(--bg);font-family:Arial,sans-serif;color:var(--text);font-size:14px;min-height:100vh;}

/* HEADER */
header{background:var(--navy);border-bottom:3px solid transparent;border-image:linear-gradient(90deg,#E8187A,#D4A017,#1A8C5B) 1;position:sticky;top:0;z-index:200;}
.hdr{max-width:100%;padding:0 28px;height:60px;display:flex;align-items:center;gap:16px;}
.hdr-title{font-family:Georgia,serif;font-size:15px;font-weight:700;color:#fff;margin-left:12px;padding-left:12px;border-left:1px solid rgba(255,255,255,.2);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hdr-btn{font-size:11px;color:rgba(255,255,255,.55);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 12px;text-decoration:none;cursor:pointer;font-family:Arial,sans-serif;}
.hdr-btn:hover{color:#fff;background:rgba(255,255,255,.12);}

/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:60px;z-index:100;}
.search-wrap{position:relative;flex:0 0 210px;}
.search-wrap input{width:100%;padding:7px 10px 7px 30px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:Arial,sans-serif;background:var(--surface);}
.search-wrap input:focus{outline:none;border-color:var(--pink);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);}
.filter-sel{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12.5px;font-family:Arial,sans-serif;background:var(--surface);cursor:pointer;color:var(--text);}
.filter-sel:focus{outline:none;border-color:var(--pink);}
.view-pills{display:flex;gap:2px;background:var(--tan);border:1.5px solid var(--border);border-radius:10px;padding:3px;}
.vp{font-size:11.5px;font-weight:600;font-family:Arial,sans-serif;padding:5px 13px;border-radius:7px;border:none;background:none;cursor:pointer;color:var(--muted);transition:all .15s;}
.vp.on{background:var(--surface);color:var(--pink);box-shadow:0 1px 4px rgba(0,0,0,.10);}
.btn-add{margin-left:auto;background:var(--pink);color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;white-space:nowrap;}
.btn-add:hover{background:#c41268;}

/* SERVICE FILTER PILLS */
.svc-bar{padding:10px 24px;background:var(--cream);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.svc-bar-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);white-space:nowrap;margin-right:2px;}
.svc-pill{font-size:11.5px;font-weight:600;font-family:Arial,sans-serif;padding:4px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap;}
.svc-pill:hover{border-color:var(--navy);color:var(--navy);}
.svc-pill.on{background:var(--navy);color:#fff;border-color:var(--navy);}

/* VIEWS */
.view{display:none;padding:20px 24px 60px;}
.view.on{display:block;}

/* MAP VIEW */
.map-scroll{overflow-x:auto;padding-bottom:12px;}
.map-lanes{display:flex;gap:14px;align-items:flex-start;min-width:max-content;}
.lane{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;width:210px;flex-shrink:0;overflow:hidden;}
.lane-hdr{background:var(--navy);padding:10px 14px;border-bottom:3px solid var(--pink);}
.lane-title{font-family:Georgia,serif;font-size:12px;font-weight:700;color:#fff;line-height:1.3;}
.lane-tier-sec{border-top:1px solid var(--border);}
.tier-sec-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:5px 10px 3px;display:flex;align-items:center;gap:5px;color:var(--muted);background:var(--cream);}
.tier-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.lane-cards{padding:6px;display:flex;flex-direction:column;gap:5px;min-height:36px;}
.empty-lane{text-align:center;padding:14px 8px;font-size:11px;color:var(--muted);font-style:italic;}

/* PARTNER CARD */
.pcard{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:9px 10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;user-select:none;}
.pcard:hover{border-color:var(--pink);box-shadow:0 2px 8px rgba(232,24,122,.1);}
.pcard-top{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.pcard-avt{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:Georgia,serif;}
.pcard-name{font-family:Georgia,serif;font-size:12.5px;font-weight:700;color:var(--navy);line-height:1.25;}
.pcard-creds{font-size:10px;color:var(--muted);font-style:italic;}
.pcard-role{font-size:10.5px;color:var(--text);margin-top:2px;line-height:1.3;}
.pcard-org{font-size:10px;color:var(--muted);}
.tier-badge{display:inline-block;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:8px;margin:4px 1px 0 0;letter-spacing:.02em;}
.t-preferred{background:#E8F5EE;color:#0D6644;}
.t-active{background:#FEF8E7;color:#8A5800;}
.t-prospective{background:rgba(26,26,46,.08);color:var(--navy);}
.t-inactive{background:var(--tan);color:var(--muted);}
.exp-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.etag{font-size:9px;padding:1px 6px;border-radius:5px;background:var(--cream);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all .12s;}
.etag:hover,.etag.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.pcard-icons{display:flex;gap:6px;margin-top:5px;}
.pcard-ico{font-size:12px;color:var(--muted);text-decoration:none;transition:color .12s;}
.pcard-ico:hover{color:var(--pink);}

/* TIER VIEW */
.tier-section{margin-bottom:28px;}
.tier-section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.tier-section-name{font-family:Georgia,serif;font-size:16px;font-weight:700;}
.tier-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}

/* DIRECTORY VIEW */
.dir-table{width:100%;border-collapse:collapse;}
.dir-table th{text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--border);}
.dir-table td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.dir-table tr:hover td{background:var(--cream);}
.dir-avt{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:Georgia,serif;}

/* CATEGORIES VIEW */
.cat-manager{max-width:640px;}
.cat-manager h2{font-family:Georgia,serif;font-size:20px;color:var(--navy);margin-bottom:6px;}
.cat-manager p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.cat-list{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.cat-item{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;transition:border-color .12s;}
.cat-item:focus-within{border-color:var(--pink);}
.cat-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cat-name-input{flex:1;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--navy);font-family:Arial,sans-serif;padding:2px 4px;border-radius:4px;outline:none;}
.cat-name-input:focus{background:var(--cream);}
.cat-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 4px;line-height:1;}
.cat-del:hover{color:var(--pink);}
.cat-add-row{display:flex;gap:8px;}
.cat-add-row input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:Arial,sans-serif;}
.cat-add-row input:focus{outline:none;border-color:var(--pink);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;padding:28px 30px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-family:Georgia,serif;font-size:19px;font-weight:700;color:var(--navy);margin-bottom:18px;}
.modal-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border);}
.modal-tab{font-size:12px;font-weight:600;font-family:Arial,sans-serif;padding:6px 14px;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s;}
.modal-tab.on{color:var(--pink);border-bottom-color:var(--pink);}
.modal-section{display:none;}
.modal-section.on{display:block;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px;}
.form-label small{font-size:9.5px;font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted);}
.form-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:Arial,sans-serif;background:var(--surface);color:var(--text);}
.form-input:focus{outline:none;border-color:var(--pink);}
select.form-input{cursor:pointer;}
textarea.form-input{resize:vertical;min-height:70px;}
.cats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;max-height:165px;overflow-y:auto;padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;background:var(--cream);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);font-family:Arial,sans-serif;}
.btn:hover{border-color:var(--navy);}
.btn-primary{background:var(--pink);color:#fff;border-color:var(--pink);}
.btn-primary:hover{background:#c41268;}
.btn-danger{background:none;border-color:#fca5a5;color:#dc2626;margin-right:auto;}
.btn-danger:hover{background:#fef2f2;}

/* EMPTY / TOAST */
.empty-state{text-align:center;padding:60px 24px;color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--emerald);}
.tier-pill{font-size:11.5px;font-weight:600;font-family:Arial,sans-serif;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap;}
.tier-pill:hover{border-color:var(--charcoal);color:var(--charcoal);}
.tier-pill.on[data-tier=""]{background:var(--navy);color:#fff;border-color:var(--navy);}
.tier-pill.on[data-tier="preferred"]{background:#1A8C5B;color:#fff;border-color:#1A8C5B;}
.tier-pill.on[data-tier="active"]{background:#D4A017;color:#fff;border-color:#D4A017;}
.tier-pill.on[data-tier="prospective"]{background:#1A1A2E;color:#fff;border-color:#1A1A2E;}
.tier-pill.on[data-tier="inactive"]{background:#8A847C;color:#fff;border-color:#8A847C;}
</style>
</head>

<script>var _tierFilter = new Set();


var partners   = [];
var categories = [];
var _view      = 'map';
var _svcFilter = '';
var _tagFilter = '';

var DEFAULT_CATS = [
  'Advocacy',
  'Behavioral Health',
  'Child Health',
  'Chronic Disease',
  'Climate & Health',
  'Community Health',
  'Digital Health',
  'Environmental Health',
  'Grant Writing',
  'Health Communications',
  'Health Equity',
  'Health Literacy',
  'Health Policy',
  'Health Technology',
  'Maternal Health',
  'Mental Health',
  'Nutrition',
  'Physical Activity',
  'Racial Justice',
  'Research & Data',
  'Substance Use',
  'Workforce Development'
];

var CAT_COLORS = [
  '#E8187A','#1A8C5B','#D4A017','#1A1A2E','#C73060','#0D6644',
  '#8A5800','#0D4F3C','#5B1A5E','#1A4FA0','#7A1A1A','#4A6B1A',
  '#6B3A1A','#1A5F7A','#7A3F1A','#2D6B1A','#5B3A7A','#1A6B5B',
  '#7A1A4A','#3A5B1A','#1A3A7A','#6B5B1A'
];

var TIERS = [
  {key:'preferred',  label:'Preferred Partner',   color:'#1A8C5B', bg:'#E8F5EE'},
  {key:'active',     label:'Active Collaborator',  color:'#8A5800', bg:'#FEF8E7'},
  {key:'prospective',label:'Prospective',          color:'#1A1A2E', bg:'rgba(26,26,46,.07)'},
  {key:'inactive',   label:'Inactive',             color:'#8A847C', bg:'#EDE8DC'},
];

// -- INIT -------------------------------------------------------
categories = DEFAULT_CATS.slice();
populateCatsGrid([]);

function initData() {
  window._fbListen('partners', function(data) {
    partners = data ? Object.entries(data).map(function(e){ return Object.assign({fbKey:e[0]}, e[1]); }) : [];
    updateOrgFilter();
    renderAll();
  });
  window._fbListen('partner_categories', function(data) {
    if (data) {
      categories = Array.isArray(data) ? data.filter(Boolean) : Object.values(data).filter(Boolean);
    } else {
      window._fbSet('partner_categories', DEFAULT_CATS);
      categories = DEFAULT_CATS.slice();
    }
    renderAll();
    renderCatManager();
  });
}

// -- HELPERS ----------------------------------------------------
function tier(key) {
  return TIERS.find(function(t){ return t.key === key; }) || TIERS[2];
}

function initials(name) {
  if (!name) return '?';
  var parts = name.trim().split(' ').filter(function(p){ return p.length > 0; });
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

function catColor(cat) {
  var idx = categories.indexOf(cat);
  return idx >= 0 ? CAT_COLORS[idx % CAT_COLORS.length] : '#8A847C';
}

function partnerCats(p) {
  if (Array.isArray(p.cats) && p.cats.length) return p.cats;
  return [p.cat, p.cat2].filter(Boolean);
}

function avatarColor(p) {
  var svc = p.svc || p.svcs && p.svcs[0] || '';
  var colors = ['#E8187A','#1A8C5B','#D4A017','#1A1A2E','#C73060','#8A5800','#5B1A5E','#1A4FA0','#7A1A1A','#4A6B1A','#0D4F3C','#1A5F7A'];
  var svcs = ['Business Development','Community Engagement','Communications Strategy','Creative Services','Digital Media Strategy','Grant Writing','Health Education','Media Relations','Program Evaluation','Project Management','Research','Science & Medical Writing'];
  var idx = svcs.indexOf(svc);
  return idx >= 0 ? colors[idx] : '#1A1A2E';
}


function toggleTierPill(btn) {
  var tier = btn.dataset.tier;
  if (tier === '') {
    // "All" selected - clear individual selections
    _tierFilter.clear();
    document.querySelectorAll('.tier-pill').forEach(function(b){ b.classList.remove('on'); });
    btn.classList.add('on');
  } else {
    // Toggle this tier
    var allBtn = document.querySelector('.tier-pill[data-tier=""]');
    if (_tierFilter.has(tier)) {
      _tierFilter.delete(tier);
      btn.classList.remove('on');
    } else {
      _tierFilter.add(tier);
      btn.classList.add('on');
    }
    // If nothing selected, revert to All
    if (_tierFilter.size === 0) {
      if (allBtn) allBtn.classList.add('on');
    } else {
      if (allBtn) allBtn.classList.remove('on');
    }
  }
  renderAll();
}
window.toggleTierPill = toggleTierPill;

function filtered() {
  var q    = (document.getElementById('search').value || '').toLowerCase();
  var org_f  = document.getElementById('f-org').value;
  return partners.filter(function(p) {
    if (_svcFilter && (p.svc || '') !== _svcFilter) return false;
    if (_tierFilter.size > 0 && !_tierFilter.has(p.tier)) return false;
    if (org_f  && (p.org||'') !== org_f) return false;
    if (_tagFilter && partnerCats(p).indexOf(_tagFilter) < 0) return false;
    if (q && !((p.name||'')+(p.org||'')+(p.expertise||'')+(p.title||'')).toLowerCase().includes(q)) return false;
    return true;
  });
}

function showToast(msg, ok) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (ok?' ok':'');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.className='toast'; }, 2500);
}

function updateOrgFilter() {
  var orgs = Array.from(new Set(partners.map(function(p){ return p.org||''; }).filter(Boolean))).sort();
  var sel  = document.getElementById('f-org');
  var cur  = sel.value;
  sel.innerHTML = '<option value="">All Organizations</option>' +
    orgs.map(function(o){ return '<option value="'+o+'"'+(o===cur?' selected':'')+'>'+o+'</option>'; }).join('');
}

// -- CARD HTML --------------------------------------------------
function cardHTML(p) {
  var t_info  = tier(p.tier);
  var avt_bg  = avatarColor(p);
  var pc      = partnerCats(p);
  var contact = '';
  if (p.email) contact += '<a class="pcard-ico" href="mailto:'+p.email+'" onclick="event.stopPropagation()" title="'+p.email+'">&#9993;</a>';
  if (p.phone) contact += '<a class="pcard-ico" href="tel:'+p.phone+'" onclick="event.stopPropagation()" title="'+p.phone+'">&#128222;</a>';
  if (p.web)   contact += '<a class="pcard-ico" href="'+p.web+'" target="_blank" onclick="event.stopPropagation()" title="Website">&#127760;</a>';
  var tags = pc.map(function(c){
    var on = c === _tagFilter ? ' on' : '';
    return '<span class="etag'+on+'" onclick="event.stopPropagation();tagFilter(\''+c.replace(/'/g,"\\'")+'\')" >'+c+'</span>';
  }).join('');
  var subBadge = p.subcon === 'yes' ? '<span style="font-size:9px;background:#E8F5EE;color:#0D6644;padding:1px 5px;border-radius:5px;font-weight:700;margin-left:3px;">sub</span>' : '';
  return '<div class="pcard" onclick="openModal(\''+p.fbKey+'\')">' +
    '<div class="pcard-top"><div class="pcard-avt" style="background:'+avt_bg+'22;color:'+avt_bg+';">'+initials(p.name)+'</div>'+
    '<div><div class="pcard-name">'+( p.name||'Unnamed')+'</div>'+
    (p.creds?'<div class="pcard-creds">'+p.creds+'</div>':'')+
    '</div></div>'+
    (p.title?'<div class="pcard-role">'+p.title+'</div>':'')+
    (p.org?'<div class="pcard-org">'+p.org+'</div>':'')+
    '<div style="margin-top:4px;"><span class="tier-badge t-'+p.tier+'" style="background:'+t_info.bg+';color:'+t_info.color+';">'+t_info.label+'</span>'+subBadge+'</div>'+
    (tags?'<div class="exp-tags">'+tags+'</div>':'')+
    (contact?'<div class="pcard-icons">'+contact+'</div>':'')+
    '</div>';
}

// -- TAG FILTER -------------------------------------------------
function tagFilter(tag) {
  _tagFilter = _tagFilter === tag ? '' : tag;
  renderAll();
}
window.tagFilter = tagFilter;

// -- SERVICE FILTER ---------------------------------------------
function filterSvc(svc, btn) {
  _svcFilter = svc;
  document.querySelectorAll('.svc-pill').forEach(function(p){ p.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  else if (!svc) {
    var allBtn = document.querySelector('.svc-pill');
    if (allBtn) allBtn.classList.add('on');
  }
  renderAll();
}
window.filterSvc = filterSvc;

// -- MAP VIEW ---------------------------------------------------
var SVC_AREAS = [
  'Business Development','Community Engagement','Communications Strategy',
  'Creative Services','Digital Media Strategy','Grant Writing',
  'Health Education','Media Relations','Program Evaluation',
  'Project Management','Research','Science & Medical Writing'
];

function renderMap() {
  var data = filtered();
  var areas = _svcFilter ? [_svcFilter] : SVC_AREAS;
  var html = areas.map(function(svc) {
    var ap = data.filter(function(p){ return (p.svc||'') === svc; });
    var tiers_html = TIERS.map(function(t) {
      var tp = ap.filter(function(p){ return p.tier === t.key; });
      if (!tp.length) return '';
      return '<div class="lane-tier-sec">'+
        '<div class="tier-sec-label"><div class="tier-dot" style="background:'+t.color+';"></div>'+t.label+'</div>'+
        '<div class="lane-cards">'+tp.map(cardHTML).join('')+'</div>'+
        '</div>';
    }).join('');
    var empty = !ap.length ? '<div class="empty-lane">No partners yet</div>' : '';
    return '<div class="lane">'+
      '<div class="lane-hdr"><div class="lane-title">'+svc+'</div></div>'+
      tiers_html + empty +
      '</div>';
  }).join('');
  document.getElementById('map-lanes').innerHTML = html;
}

// -- TIER VIEW --------------------------------------------------
function renderTier() {
  var data = filtered();
  var html = TIERS.map(function(t) {
    var tp = data.filter(function(p){ return p.tier === t.key; });
    if (!tp.length) return '';
    return '<div class="tier-section">'+
      '<div class="tier-section-hdr">'+
      '<div class="tier-section-name" style="color:'+t.color+';">'+t.label+'</div>'+
      '</div>'+
      '<div class="tier-cards-grid">'+tp.map(cardHTML).join('')+'</div>'+
      '</div>';
  }).join('');
  document.getElementById('view-tier').innerHTML = html || '<div class="empty-state">No partners match current filters.</div>';
}

// -- DIRECTORY VIEW ---------------------------------------------
function renderDir() {
  var data = filtered().slice().sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  var html = data.map(function(p) {
    var t_info = tier(p.tier);
    var avt_bg = avatarColor(p);
    var pc = partnerCats(p).slice(0,3).map(function(c){
      return '<span class="etag">'+c+'</span>';
    }).join(' ');
    return '<tr onclick="openModal(\''+p.fbKey+'\')" style="cursor:pointer;">'+
      '<td><div style="display:flex;align-items:center;gap:8px;">'+
      '<div class="dir-avt" style="background:'+avt_bg+'22;color:'+avt_bg+';">'+initials(p.name)+'</div>'+
      '<div><div style="font-weight:600;color:var(--navy);">'+( p.name||'')+'</div>'+
      (p.creds?'<div style="font-size:10.5px;color:var(--muted);">'+p.creds+'</div>':'')+
      '</div></div></td>'+
      '<td style="font-size:12px;color:var(--muted);">'+(p.svc||'')+'</td>'+
      '<td>'+(pc||'<span style="color:var(--muted);font-size:11px;">-</span>')+'</td>'+
      '<td><span class="tier-badge t-'+p.tier+'" style="background:'+t_info.bg+';color:'+t_info.color+';">'+t_info.label+'</span></td>'+
      '</tr>';
  }).join('');
  document.getElementById('dir-body').innerHTML = html || '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:30px;">No partners match current filters.</td></tr>';
}

// -- CAT MANAGER ------------------------------------------------
function renderCatManager() {
  var el = document.getElementById('cat-list');
  if (!el) return;
  el.innerHTML = categories.map(function(cat, i) {
    var color = CAT_COLORS[i % CAT_COLORS.length];
    return '<div class="cat-item">'+
      '<div class="cat-swatch" style="background:'+color+';"></div>'+
      '<input class="cat-name-input" type="text" value="'+cat.replace(/"/g,'&quot;')+'" '+
        'onblur="renameCategory('+i+',this.value)" data-enter-blur="1">'+
      '<button class="cat-del" onclick="deleteCategory('+i+')" title="Remove">x</button>'+
      '</div>';
  }).join('');
}
window.renderCatManager = renderCatManager;

function addCategory() {
  var inp = document.getElementById('cat-input');
  var val = inp.value.trim();
  if (!val || categories.includes(val)) return;
  categories.push(val);
  inp.value = '';
  if (window._fbReady) window._fbSet('partner_categories', categories);
  populateCatsGrid([]);
  renderAll();
  renderCatManager();
  showToast('Category added', true);
}
window.addCategory = addCategory;

function renameCategory(idx, newName) {
  newName = newName.trim();
  if (!newName || newName === categories[idx]) return;
  var old = categories[idx];
  categories[idx] = newName;
  partners.forEach(function(p) {
    var pc = partnerCats(p); var changed = {};
    var ci = pc.indexOf(old);
    if (ci >= 0) { pc[ci] = newName; p.cats = pc; changed = {cats:pc}; }
    if (Object.keys(changed).length && window._fbReady) window._fbUpdate('partners/'+p.fbKey, changed);
  });
  if (window._fbReady) window._fbSet('partner_categories', categories);
  renderAll(); renderCatManager();
  showToast('Renamed', true);
}
window.renameCategory = renameCategory;

function deleteCategory(idx) {
  var cat = categories[idx];
  if (!confirm('Remove "'+cat+'"?')) return;
  categories.splice(idx, 1);
  if (window._fbReady) window._fbSet('partner_categories', categories);
  renderAll(); renderCatManager();
  showToast('Category removed');
}
window.deleteCategory = deleteCategory;

// -- CATS GRID IN MODAL -----------------------------------------
function populateCatsGrid(selected) {
  var grid = document.getElementById('p-cats-grid');
  if (!grid) return;
  var sorted = categories.slice().sort(function(a,b){ return a.toLowerCase()<b.toLowerCase()?-1:1; });
  grid.innerHTML = sorted.map(function(c) {
    var checked = selected.indexOf(c) >= 0;
    var color   = catColor(c);
    var bg = checked ? 'background:'+color+'18;border:1.5px solid '+color+'66;' : 'background:transparent;border:1.5px solid transparent;';
    return '<label style="display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:5px;cursor:pointer;'+bg+'transition:background .12s;">'+
      '<input type="checkbox" value="'+c+'" '+(checked?'checked':'')+
      ' onchange="updateCatCount()" style="width:12px;height:12px;accent-color:'+color+';cursor:pointer;flex-shrink:0;">'+
      '<span style="font-size:11px;color:var(--text);line-height:1.25;">'+c+'</span>'+
      '</label>';
  }).join('');
  updateCatCount();
}

function updateCatCount() {
  var grid = document.getElementById('p-cats-grid');
  var cnt  = document.getElementById('p-cats-count');
  if (!grid||!cnt) return;
  var n = grid.querySelectorAll('input:checked').length;
  cnt.textContent = n + ' selected';
  cnt.style.color = n > 0 ? 'var(--emerald)' : 'var(--muted)';
}
window.updateCatCount = updateCatCount;

function getSelectedCats() {
  var grid = document.getElementById('p-cats-grid');
  if (!grid) return [];
  return Array.from(grid.querySelectorAll('input:checked')).map(function(cb){ return cb.value; });
}

// -- RENDER ALL -------------------------------------------------
function renderAll() {
  if (_view === 'map')  renderMap();
  if (_view === 'tier') renderTier();
  if (_view === 'dir')  renderDir();
  if (_view === 'cats') renderCatManager();
}
window.renderAll = renderAll;

// -- SWITCH VIEW ------------------------------------------------
function switchView(name, btn) {
  _view = name;
  ['map','tier','dir','cats'].forEach(function(v){
    document.getElementById('view-'+v).classList.toggle('on', v===name);
  });
  document.querySelectorAll('.vp').forEach(function(b){ b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  // Show svc-bar only on map view
  var svcBar = document.getElementById('svc-bar');
  if (svcBar) svcBar.style.display = name === 'map' ? '' : 'none';
  renderAll();
}
window.switchView = switchView;

// -- MODAL ------------------------------------------------------
function openModal(fbKey) {
  var p = fbKey ? partners.find(function(x){ return x.fbKey===fbKey; }) : null;
  document.getElementById('modal-title').textContent = p ? 'Edit Partner' : 'Add Partner';
  document.getElementById('p-del-btn').style.display = p ? 'inline-block' : 'none';
  document.getElementById('p-edit-id').value = fbKey||'';
  document.getElementById('p-type').value       = p ? (p.type||'individual') : 'individual';
  document.getElementById('p-tier').value       = p ? (p.tier||'prospective') : 'prospective';
  document.getElementById('p-name').value       = p ? (p.name||'') : '';
  document.getElementById('p-creds').value      = p ? (p.creds||'') : '';
  document.getElementById('p-title').value      = p ? (p.title||'') : '';
  document.getElementById('p-org').value        = p ? (p.org||'') : '';
  document.getElementById('p-svc').value        = p ? (p.svc||'') : '';
  document.getElementById('p-expertise').value  = p ? (p.expertise||'') : '';
  document.getElementById('p-email').value      = p ? (p.email||'') : '';
  document.getElementById('p-phone').value      = p ? (p.phone||'') : '';
  document.getElementById('p-web').value        = p ? (p.web||'') : '';
  document.getElementById('p-pref').value       = p ? (p.pref||'') : '';
  document.getElementById('p-source').value     = p ? (p.source||'') : '';
  document.getElementById('p-notes').value      = p ? (p.notes||'') : '';
  document.getElementById('p-lastcontact').value= p ? (p.lastContact||'') : '';
  document.getElementById('p-subcon').value     = p ? (p.subcon||'') : '';
  if (!categories.length) categories = DEFAULT_CATS.slice();
  populateCatsGrid(p ? partnerCats(p) : []);
  toggleOrgFields();
  switchModalTab('identity', document.querySelector('.modal-tab'));
  document.getElementById('modal-partner').classList.add('open');
}
window.openModal = openModal;

function closeModal() {
  document.getElementById('modal-partner').classList.remove('open');
}
window.closeModal = closeModal;

function switchModalTab(tab, btn) {
  ['identity','contact','network'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('on', t===tab);
  });
  document.querySelectorAll('.modal-tab').forEach(function(b){ b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
}
window.switchModalTab = switchModalTab;

function toggleOrgFields() {
  var isInd = document.getElementById('p-type').value === 'individual';
  document.getElementById('individual-fields').style.display = isInd ? '' : 'none';
}
window.toggleOrgFields = toggleOrgFields;

function savePartner() {
  var name = document.getElementById('p-name').value.trim();
  if (!name) { showToast('Name is required'); return; }
  var cats = getSelectedCats();
  var rec = {
    type:       document.getElementById('p-type').value,
    tier:       document.getElementById('p-tier').value,
    name:       name,
    creds:      document.getElementById('p-creds').value.trim(),
    title:      document.getElementById('p-title').value.trim(),
    org:        document.getElementById('p-org').value.trim(),
    svc:        document.getElementById('p-svc').value,
    cats:       cats,
    cat:        cats[0]||'',
    expertise:  document.getElementById('p-expertise').value.trim(),
    email:      document.getElementById('p-email').value.trim(),
    phone:      document.getElementById('p-phone').value.trim(),
    web:        document.getElementById('p-web').value.trim(),
    pref:       document.getElementById('p-pref').value,
    source:     document.getElementById('p-source').value.trim(),
    notes:      document.getElementById('p-notes').value.trim(),
    lastContact:document.getElementById('p-lastcontact').value,
    subcon:     document.getElementById('p-subcon').value,
    updatedAt:  new Date().toISOString(),
  };
  var id = document.getElementById('p-edit-id').value;
  var prom = id
    ? window._fbUpdate('partners/'+id, rec)
    : window._fbPush('partners', Object.assign(rec, {createdAt:new Date().toISOString()}));
  prom.then(function(){ closeModal(); showToast(id?'Partner updated':'Partner added', true); })
     .catch(function(){ showToast('Save failed - try again'); });
}
window.savePartner = savePartner;

function deletePartner() {
  var id = document.getElementById('p-edit-id').value;
  var p  = partners.find(function(x){ return x.fbKey===id; });
  if (!p || !confirm('Remove '+( p.name||'this partner')+'?')) return;
  window._fbRemove('partners/'+id)
    .then(function(){ closeModal(); showToast('Removed'); })
    .catch(function(){ showToast('Delete failed'); });
}
window.deletePartner = deletePartner;

// Backdrop and Enter key
document.getElementById('modal-partner').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Enter' && e.target.classList.contains('cat-name-input')) e.target.blur();
});

function deletePartner() {
  var id = document.getElementById('p-edit-id').value;
  var p  = partners.find(function(x){ return x.fbKey===id; });
  if (!p || !confirm('Remove '+( p.name||'this partner')+'?')) return;
  window._fbRemove('partners/'+id)
    .then(function(){ closeModal(); showToast('Removed'); })
    .catch(function(){ showToast('Delete failed'); });
}
window.deletePartner = deletePartner;

// Backdrop and Enter key
document.getElementById('modal-partner').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Enter' && e.target.classList.contains('cat-name-input')) e.target.blur();
});

</script>
